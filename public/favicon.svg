<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <!-- Mountain range silhouette representing the Narvik fjord landscape -->
  <path d="M0,128 L0,92 L20,92 L38,54 L52,70 L64,16 L76,68 L90,50 L108,92 L128,92 L128,128 Z" />
  <!-- Fjord water -->
  <rect x="0" y="100" width="128" height="6" opacity="0.35" />
  <!-- Snow cap on the central peak -->
  <path d="M64,16 L74,42 L54,42 Z" class="snow" />
  <style>
    path, rect { fill: #2a3a5c; }
    .snow { fill: #ddd8ce; }
    @media (prefers-color-scheme: dark) {
      path, rect { fill: #c9bfad; }
      .snow { fill: #ffffff; }
    }
  </style>
</svg>
