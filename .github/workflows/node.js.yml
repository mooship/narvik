name: Node.js CI

permissions:
  contents: read

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  build:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [24.x]

    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v5
      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}
          cache: "pnpm"
      - run: pnpm install --frozen-lockfile
      - name: Cache Vite cache
        uses: actions/cache@v5
        with:
          path: node_modules/.vite
          key: ${{ runner.os }}-node-${{ matrix.node-version }}-vite-${{ hashFiles('pnpm-lock.yaml', 'vite.config.*', 'tsconfig*.json') }}
          restore-keys: |
            ${{ runner.os }}-node-${{ matrix.node-version }}-vite-
      - run: pnpm build
